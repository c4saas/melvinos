# ─────────────────────────────────────────────────────────────
#  MelvinOS — Docker Compose
#  Services: app + postgres + claude-code
#
#  Usage:
#    cp .env.example .env   # fill in your keys
#    docker compose up -d
#
#  First run: navigate to http://localhost:3001 to set up your account
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-melvinos}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: melvinos
      POSTGRES_USER: melvinos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - melvinos_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melvinos -d melvinos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── MelvinOS App ─────────────────────────────────────────────
  melvinos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-melvinos}_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      AGENT_WORKSPACE_PATH: /app/workspace
      DATABASE_URL: postgres://melvinos:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/melvinos
      QDRANT_URL: ${QDRANT_URL:-http://localhost:6333}
    ports:
      - "${HOST_PORT:-3001}:3001"
    volumes:
      - uploads:/app/uploads
      - agent_workspace:/app/workspace
      - claude_ssh:/var/ssh-keys-src:ro
    networks:
      - melvinos_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/api/auth/csrf-token').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Claude Code ─────────────────────────────────────────────
  claude-code:
    build:
      context: ./claude-code
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-melvinos}_claude
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ""
    ports:
      - "${CLAUDE_SSH_PORT:-2222}:22"
    volumes:
      - claude_auth:/home/claude/.claude
      - agent_workspace:/workspace
      - claude_ssh:/root/.ssh
    networks:
      - melvinos_net

volumes:
  postgres_data:
    external: true
    name: melvinos_postgres_data
  uploads:
    external: true
    name: melvinos_uploads
  agent_workspace:
    external: true
    name: melvinos_agent_workspace
  claude_auth:
    external: true
    name: melvinos_claude_auth
  claude_ssh:
    external: true
    name: melvinos_claude_ssh

networks:
  melvinos_net:
    driver: bridge
